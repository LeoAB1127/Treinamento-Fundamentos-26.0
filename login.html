<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="assets/css/globals.css">
        <title>DinoStore - Login</title>
    </head>
    <body>
        <header class="header">
            <div class="logoEnome">
                <img class="fotopequena" src="assets/imgs/powerful-t-rex-logo-jurassic-period-concept-icon-illustration-design-vector.jpg" alt="logo do site" width="50">
                <h2>DinoStore</h2>
            </div>
        </header>
        <div class="caixaLogin">
            <h1>Login</h1>
            <form id="inputsLogin">
                <p for="usuario">Usuário:</p>
                <input type="text" id="usuarioInput" name="usuario" required>
                <p for="senha">Senha:</p>
                <input type="password" id="senhaInput" name="senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
<script src="assets/js/login.js" ></script>
</html>
